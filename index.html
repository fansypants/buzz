
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bee Keeper App</title>
    <style>
        :root {
            --yellow: #FFD700;
            --dark: #2C3E50;
            --light: #ECF0F1;
            --white: #FFFFFF;
            --red: #E74C3C;
            --green: #27AE60;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
            padding-bottom: 70px;
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--yellow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .bee-bouncer {
            font-size: 50px;
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

        /* Navigation */
        nav {
            background: var(--dark);
            color: var(--white);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .sync-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .status-ok { background: var(--green); }
        .status-offline { background: var(--red); }

        /* Main Content */
        main { padding: 15px; max-width: 800px; margin: 0 auto; }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
        }

        .standort-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary { background: var(--yellow); color: var(--dark); }
        .btn-outline { border: 1px solid var(--dark); background: transparent; }

        /* Bottom Menu */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: #777;
            text-decoration: none;
        }

        .nav-item.active { color: var(--dark); font-weight: bold; }
        .nav-item i { font-size: 20px; margin-bottom: 3px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            padding: 20px;
        }

        .modal-content {
            background: var(--white);
            border-radius: 15px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .chip {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            background: #eee;
            margin: 2px;
            font-size: 12px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loading">
    <div class="bee-bouncer">🐝</div>
    <p>Summe Daten zusammen...</p>
</div>

<nav>
    <div id="nav-title" style="font-weight: bold;">Meine Bienen</div>
    <div id="sync-indicator" class="sync-status">Wird geladen...</div>
</nav>

<main id="app-content">
    <!-- Content injected here -->
</main>

<div class="bottom-nav">
    <a href="#" class="nav-item active" onclick="showView('standorte')"><i>📍</i>Standorte</a>
    <a href="#" class="nav-item" onclick="showView('aufgaben')"><i>📋</i>Aufgaben</a>
    <a href="#" class="nav-item" onclick="showView('add')"><i>➕</i>Neu</a>
</div>

<!-- Modal für neues Volk/Eintrag -->
<div id="modal" class="modal" onclick="if(event.target==this) closeModal()">
    <div class="modal-content">
        <h2 id="modal-title">Neues Volk</h2>
        <div id="modal-body"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAs-I0Y2yX_K3tXQ0_Z0_Z0_Z0", // Deine Config hier
        authDomain: "fansypants.firebaseapp.com",
        projectId: "fansypants",
        storageBucket: "fansypants.appspot.com",
        messagingSenderId: "374249051515",
        appId: "1:374249051515:web:89978449"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentView = 'standorte';
    let standorteListe = [];
    let voelker = [];
    let aufgaben = [];
    let eintraege = [];
    let activeStandort = null;

    // --- Listeners ---
    function startListeners() {
        // Sofort das Loading verstecken, damit die App benutzbar bleibt
        document.getElementById('loading').style.display = 'none';

        try {
            onSnapshot(collection(db, 'standorte'), snap => {
                standorteListe = snap.docs.map(d => d.data().name);
                renderAll();
            });

            onSnapshot(collection(db, 'voelker'), snap => {
                voelker = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                setSyncStatus('ok');
                renderAll();
            });

            onSnapshot(collection(db, 'aufgaben'), snap => {
                aufgaben = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderAufgaben();
            });

            onSnapshot(collection(db, 'eintraege'), snap => {
                eintraege = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (activeStandort) renderVoelkerList();
            });
        } catch (e) {
            console.error("Firebase Sync Error", e);
            setSyncStatus('offline');
        }
    }

    // --- UI Logic ---
    window.showView = (view) => {
        currentView = view;
        activeStandort = null;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        renderAll();
    };

    function renderAll() {
        const container = document.getElementById('app-content');
        if (activeStandort) return; // Wenn wir in einer Detailansicht sind, bricht renderAll nicht ab

        if (currentView === 'standorte') renderStandorte();
        if (currentView === 'aufgaben') renderAufgaben();
        if (currentView === 'add') renderAddMenu();
    }

    function renderStandorte() {
        const container = document.getElementById('app-content');
        container.innerHTML = '<h1>Standorte</h1>';
        
        const uniqueStandorte = [...new Set([...standorteListe, ...voelker.map(v => v.standort)])].filter(Boolean);
        
        uniqueStandorte.forEach(s => {
            const vv = voelker.filter(v => v.standort === s);
            const auf = aufgaben.filter(a => a.standort === s && !a.erledigt).length;
            const dring = vv.filter(v => v.status === 'dringend').length;
            
            // KORRIGIERTE ZEILE HIER:
            const volkMeta = vv.length 
                ? `${vv.length} Volk${vv.length !== 1 ? 'er' : ''}${auf ? ` · ${auf} Aufgabe${auf > 1 ? 'n' : ''}` : ''}${dring ? ` · <span style="color:var(--red);font-weight:600;">${dring} dringend</span>` : ''}` 
                : 'Noch keine Völker';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="standort-header">
                    <div>
                        <strong style="font-size:18px;">${s}</strong><br>
                        <small style="color:#666">${volkMeta}</small>
                    </div>
                    <button class="btn btn-outline">Details</button>
                </div>
            `;
            card.onclick = () => openStandort(s);
            container.appendChild(card);
        });
    }

    function openStandort(name) {
        activeStandort = name;
        renderVoelkerList();
    }

    function renderVoelkerList() {
        const container = document.getElementById('app-content');
        container.innerHTML = `<button class="btn btn-outline" onclick="showView('standorte')">← Zurück</button>
                               <h1>Standort: ${activeStandort}</h1>`;
        
        const vv = voelker.filter(v => v.standort === activeStandort);
        vv.forEach(v => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${v.name}</h3><p>Typ: ${v.beute || 'Unbekannt'}</p>`;
            container.appendChild(card);
        });
    }

    function renderAufgaben() {
        const container = document.getElementById('app-content');
        container.innerHTML = '<h1>Offene Aufgaben</h1>';
        aufgaben.filter(a => !a.erledigt).forEach(a => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<strong>${a.titel}</strong><br><small>${a.standort}</small>`;
            container.appendChild(card);
        });
    }

    function renderAddMenu() {
        const container = document.getElementById('app-content');
        container.innerHTML = `<h1>Neu erstellen</h1>
            <button class="btn btn-primary" style="width:100%; margin-bottom:10px;" onclick="openModal('volk')">Neues Volk</button>
            <button class="btn btn-primary" style="width:100%;" onclick="openModal('aufgabe')">Neue Aufgabe</button>`;
    }

    window.setSyncStatus = (status) => {
        const el = document.getElementById('sync-indicator');
        if (status === 'ok') {
            el.innerText = 'Online';
            el.className = 'sync-status status-ok';
        } else {
            el.innerText = 'Offline';
            el.className = 'sync-status status-offline';
        }
    };

    window.openModal = (type) => {
        const modal = document.getElementById('modal');
        const body = document.getElementById('modal-body');
        modal.style.display = 'block';
        
        if (type === 'volk') {
            body.innerHTML = `
                <input type="text" id="vName" placeholder="Volksname (z.B. Volk 1)">
                <input type="text" id="vStandort" placeholder="Standort">
                <button class="btn btn-primary" style="width:100%" onclick="saveVolk()">Speichern</button>
            `;
        }
    };

    window.closeModal = () => document.getElementById('modal').style.display = 'none';

    // Start
    startListeners();

</script>
</body>
</html>
